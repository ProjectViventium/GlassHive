<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlassHive</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=20260416a" />
  </head>
  <body class="launch-body">
    <main class="launch-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <section class="composer-frame">
        <div class="brand-row">
          <span class="brand-mark">GlassHive</span>
          <span class="brand-mode">Workspaces</span>
        </div>
        <div class="composer-copy">
          <h1>Define the project once. Watch the workspace do the rest.</h1>
          <p>Describe the job. Set the success bar. Add context if it matters. Then choose whether to open, duplicate, or start a workspace before the live sandbox takes over the screen.</p>
        </div>
        <form id="launch-form" class="composer-form">
          <label>
            <span>Describe your project</span>
            <textarea id="description" name="description" rows="6" placeholder="What should this workspace actually accomplish?" required></textarea>
          </label>
          <label>
            <span>Success Criteria</span>
            <textarea id="success_criteria" name="success_criteria" rows="4" placeholder="What must be true before the project is considered complete?" required></textarea>
          </label>
          <label>
            <span>Context</span>
            <textarea id="context" name="context" rows="3" placeholder="Optional background, links, constraints, files, or access notes."></textarea>
          </label>
          <details class="advanced-panel">
            <summary>Advanced</summary>
            <div class="advanced-grid">
              <label class="advanced-field">
                <span>Initial watch surface</span>
                <select id="launch-surface" name="launch_surface"></select>
                <small>Desktop is the default. When live terminal-in-desktop is enabled, the active run still stays visible there.</small>
              </label>
            </div>
          </details>
          <div class="worker-row">
            <label class="worker-picker">
              <span>Workspace</span>
              <select id="workspace-option" name="workspace_option"></select>
              <small id="workspace-help" class="field-help"></small>
            </label>
            <button id="launch-button" type="submit" class="primary-button">Launch project</button>
          </div>
          <p id="launch-status" class="launch-status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="/static/app.js?v=20260416a" type="module"></script>
  </body>
</html>
