openapi: 3.1.0
info:
  title: Workers and Projects Runtime API
  version: 0.1.0
  description: Draft standalone API contract for phase 1 of the Workers and Projects Runtime.
servers:
  - url: http://localhost:8765
paths:
  /health:
    get:
      operationId: healthCheck
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                required: [status, version]
  /v1/projects:
    get:
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                required: [items]
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{project_id}:
    get:
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{project_id}/workers:
    get:
      operationId: listProjectWorkers
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Worker'
                required: [items]
    post:
      operationId: createWorker
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkerRequest'
      responses:
        '201':
          description: Worker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}:
    get:
      operationId: getWorker
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Worker detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}/assign:
    post:
      operationId: assignWorkerRun
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
  /v1/workers/{worker_id}/interrupt:
    post:
      operationId: interruptWorker
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '202':
          description: Interrupt accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}/pause:
    post:
      operationId: pauseWorker
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '202':
          description: Pause accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}/resume:
    post:
      operationId: resumeWorker
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '202':
          description: Resume accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}/terminate:
    post:
      operationId: terminateWorker
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '202':
          description: Terminate accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'
  /v1/workers/{worker_id}/message:
    post:
      operationId: sendWorkerMessage
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerMessageRequest'
      responses:
        '202':
          description: Message accepted
  /v1/workers/{worker_id}/takeover:
    get:
      operationId: getWorkerTakeover
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Takeover metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TakeoverInfo'
  /v1/workers/{worker_id}/events:
    get:
      operationId: listWorkerEvents
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Worker events
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                required: [items]
components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    WorkerId:
      name: worker_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Project:
      type: object
      properties:
        project_id:
          type: string
        owner_id:
          type: string
        title:
          type: string
        goal:
          type: string
        status:
          type: string
        summary:
          type: string
        default_worker_profile:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [project_id, owner_id, title, goal, status, created_at, updated_at]
    Worker:
      type: object
      properties:
        worker_id:
          type: string
        project_id:
          type: string
        owner_id:
          type: string
        name:
          type: string
        role:
          type: string
        profile:
          type: string
        backend:
          type: string
        state:
          type: string
        takeover_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [worker_id, project_id, owner_id, name, role, profile, backend, state, created_at, updated_at]
    Run:
      type: object
      properties:
        run_id:
          type: string
        worker_id:
          type: string
        project_id:
          type: string
        instruction:
          type: string
        state:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
      required: [run_id, worker_id, project_id, instruction, state]
    Event:
      type: object
      properties:
        event_id:
          type: string
        project_id:
          type: string
        worker_id:
          type: string
        run_id:
          type: string
          nullable: true
        event_type:
          type: string
        message:
          type: string
        created_at:
          type: string
          format: date-time
      required: [event_id, project_id, worker_id, event_type, message, created_at]
    CreateProjectRequest:
      type: object
      properties:
        owner_id:
          type: string
        title:
          type: string
        goal:
          type: string
        default_worker_profile:
          type: string
      required: [owner_id, title, goal]
    CreateWorkerRequest:
      type: object
      properties:
        owner_id:
          type: string
        name:
          type: string
        role:
          type: string
        profile:
          type: string
        backend:
          type: string
      required: [owner_id, name, role, profile, backend]
    AssignRunRequest:
      type: object
      properties:
        instruction:
          type: string
      required: [instruction]
    WorkerMessageRequest:
      type: object
      properties:
        message:
          type: string
      required: [message]
    TakeoverInfo:
      type: object
      properties:
        supported:
          type: boolean
        url:
          type: string
          nullable: true
        mode:
          type: string
          nullable: true
      required: [supported]
